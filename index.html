<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#060b18" />
    <title>Rizwan Ali · Data Science Robotics Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>

    <!-- ─── PARTICLES ─── -->
    <div class="particle-bg" id="particleBg"></div>

    <!-- ─── MOBILE TOP BAR (visible <768px) ─── -->
    <header class="mobile-topbar">
        <button class="hamburger-btn" id="hamburgerBtn" aria-label="Open menu" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>
        <div class="mobile-logo">
            <span class="neon-dot"></span>
            <span>Da Vinci Resolution</span>
        </div>
        <div class="mobile-mastered">⚡ <span id="masteredCountMobile">0</span></div>
    </header>

    <!-- ─── SIDEBAR BACKDROP (mobile drawer) ─── -->
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <!-- ─── TOPIC DETAIL MODAL ─── -->
    <div class="modal-overlay" id="topicModal">
        <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <button class="modal-close" id="modalCloseBtn" aria-label="Close">✕</button>
            <div class="modal-title" id="modalTitle">Topic Title</div>
            <div class="modal-meta" id="modalMeta">
                <span class="diff-badge" id="modalDifficulty">Easy</span>
                <span id="modalLevel">Foundation</span>
                <span id="modalStatus">✅ Mastered</span>
            </div>

            <div class="modal-section chain-section" id="modalChainSection">
                <h4>⛓️ Compound Chain <span class="chain-hint">— builds on, leads to</span></h4>
                <div class="chain-strip" id="modalChainStrip"></div>
            </div>

            <div class="modal-section">
                <div class="modal-tabs-row">
                    <h4>📖 Definition</h4>
                    <div class="modal-tabs" id="defTabs">
                        <button class="tab-btn active" data-tab="basic">🌱 Basic</button>
                        <button class="tab-btn" data-tab="advanced">🚀 Advanced</button>
                    </div>
                </div>
                <p id="modalDefinition">Definition goes here.</p>
            </div>
            <div class="modal-section">
                <div class="modal-tabs-row">
                    <h4>💻 Example</h4>
                    <div class="modal-tabs" id="exTabs">
                        <button class="tab-btn active" data-tab="basic">🌱 Basic</button>
                        <button class="tab-btn" data-tab="advanced">🚀 Advanced</button>
                    </div>
                </div>
                <div class="code-block" id="modalExample"># code example</div>
            </div>
            <div class="modal-section">
                <h4>🔗 Resources</h4>
                <ul class="resource-list" id="modalResources">
                    <li><a href="#" target="_blank" rel="noopener">Resource 1</a></li>
                </ul>
            </div>
        </div>
    </div>

    <!-- ─── SIDEBAR ─── -->
    <aside class="sidebar" id="sidebar">
        <div class="logo">
            <span class="neon-dot"></span>
            <span>Rizwan Ali</span>
            <span class="badge">Compound Engine</span>
        </div>
        <nav class="nav" id="mainNav">
            <button class="active" data-view="overview"><span class="icon">📊</span> Overview</button>
            <button data-view="syllabus"><span class="icon">📚</span> Syllabus <span class="notif"
                    id="syllabusNotif">0</span></button>
            <button data-view="lab"><span class="icon">🤖</span> Robotics Lab</button>
            <button data-view="timer"><span class="icon">⏱️</span> Time Manager</button>
            <button data-view="knowledge"><span class="icon">🧠</span> Knowledge Map</button>
        </nav>
        <div class="sidebar-footer">
            <div class="row">
                <div class="avatar">DS</div>
                <div>
                    <div class="name">Data Scientist</div>
                    <div class="title">⚡ <span id="masteredCount">0</span> topics mastered</div>
                </div>
                <div class="streak">🔥 <span id="streakDays">7</span>d</div>
            </div>
        </div>
    </aside>

    <!-- ─── MAIN ─── -->
    <main class="main" id="mainContent">
        <div class="top-bar">
            <h1>⚡ <span class="highlight">Data Science</span> · Robotics Lab</h1>
            <div class="top-right">
                <span class="day-badge" id="dayDisplay"></span>
                <button class="focus-mode-btn" id="focusToggle">🎯 Focus Mode</button>
            </div>
        </div>
        <div id="viewContainer"></div>
    </main>

    <!-- ─── MOBILE BOTTOM TAB BAR (visible <768px) ─── -->
    <nav class="bottom-tabbar" id="bottomTabbar" aria-label="Primary">
        <button class="active" data-view="overview"><span class="icon">📊</span><span class="lbl">Home</span></button>
        <button data-view="syllabus"><span class="icon">📚</span><span class="lbl">Syllabus</span><span class="notif" id="syllabusNotifMobile">0</span></button>
        <button data-view="lab"><span class="icon">🤖</span><span class="lbl">Lab</span></button>
        <button data-view="timer"><span class="icon">⏱️</span><span class="lbl">Timer</span></button>
        <button data-view="knowledge"><span class="icon">🧠</span><span class="lbl">Map</span></button>
    </nav>

    <script src="./js/script.js"></script>

</body>

</html>
